<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tik2BD - TikTok Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: Inter, sans-serif; background: #0f172a; background-image: radial-gradient(circle at top, #1d4ed8 0, #0f172a 45%); }
        .card { background: rgba(255, 255, 255, .06); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, .08); }
    </style>
</head>
<body class="text-white min-h-screen">
    <div class="max-w-3xl mx-auto px-5 py-12">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-6xl font-extrabold mt-5 bg-gradient-to-r from-cyan-300 via-blue-400 to-violet-400 bg-clip-text text-transparent">Tik2BD Downloader</h1>
        </header>
        
        <div class="card rounded-3xl p-3 shadow-2xl">
            <div class="flex flex-col sm:flex-row gap-3">
                <input id="urlInput" placeholder="Paste TikTok video link..." class="flex-1 bg-transparent outline-none px-4 py-4 placeholder:text-slate-400">
                <button id="downloadBtn" onclick="downloadVideo()" class="px-7 py-3 rounded-2xl font-bold bg-gradient-to-r from-cyan-500 to-blue-600 hover:scale-[1.02] transition">Download</button>
            </div>
        </div>
        
        <div id="result" class="mt-5"></div>
        
        <footer class="text-center text-slate-400 py-10">
            <p>Developed by Akash Islam | SkyNet Digital AI</p>
        </footer>
    </div>
    
    <script>
        async function downloadVideo() {
            const b = document.getElementById('downloadBtn');
            const r = document.getElementById('result');
            const i = document.getElementById('urlInput');
            
            if(!i.value.trim()) return alert('Paste a link!');
            
            b.disabled = true;
            b.innerText = 'Processing...';
            r.innerHTML = '<p class="text-blue-300">Getting your video...</p>';
            
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: i.value.trim()})
                });
                const d = await response.json();
                
                if(d.success) {
                    // সরাসরি লিঙ্কে পাঠিয়ে দেওয়া হচ্ছে
                    window.location.href = d.url; 
                    r.innerHTML = '<p class="text-emerald-300">Download starting... If not, <a href="'+d.url+'" target="_blank" class="underline font-bold">Click Here</a></p>';
                } else {
                    r.innerHTML = '<p class="text-red-300">Error: Could not find video.</p>';
                }
            } catch(e) {
                r.innerHTML = '<p class="text-red-300">Server error.</p>';
            }
            b.disabled = false;
            b.innerText = 'Download';
        }
    </script>
</body>
</html>
