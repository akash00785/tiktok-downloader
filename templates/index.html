<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik2BD - TikTok Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .glass-input { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white antialiased min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl mt-10 text-center mb-10">
        <h1 class="text-4xl font-extrabold mb-2">Tik2BD Downloader</h1>
        <p class="text-slate-400">Download without watermark in HD</p>
    </header>

    <div class="w-full max-w-2xl glass-input p-2 rounded-xl flex items-center gap-2 shadow-lg">
        <input type="text" id="urlInput" placeholder="Paste your TikTok link here..." 
               class="w-full bg-transparent p-3 text-white outline-none placeholder-slate-500">
        
        <button id="pasteBtn" onclick="pasteLink()" class="px-4 py-2 bg-slate-700 rounded-lg hover:bg-slate-600 transition">Paste</button>
        <button id="clearBtn" onclick="clearInput()" class="px-4 py-2 bg-red-500/20 text-red-400 rounded-lg hidden transition">Clear</button>
        
        <button onclick="downloadVideo()" id="downloadBtn" class="bg-blue-600 px-6 py-2 rounded-lg font-bold hover:bg-blue-500 transition">Download</button>
    </div>

    <div id="result" class="mt-6 w-full max-w-2xl text-center"></div>

    <section class="max-w-2xl w-full mt-10 grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-slate-800 p-4 rounded-xl text-center"><h3 class="text-blue-400 font-bold">No Watermark</h3></div>
        <div class="bg-slate-800 p-4 rounded-xl text-center"><h3 class="text-purple-400 font-bold">HD Quality</h3></div>
        <div class="bg-slate-800 p-4 rounded-xl text-center"><h3 class="text-green-400 font-bold">Fast</h3></div>
    </section>

    <script>
        const input = document.getElementById('urlInput');
        const pasteBtn = document.getElementById('pasteBtn');
        const clearBtn = document.getElementById('clearBtn');

        // ইনপুট ট্র্যাক করার জন্য ফাংশন
        input.addEventListener('input', () => {
            if (input.value.length > 0) {
                pasteBtn.classList.add('hidden');
                clearBtn.classList.remove('hidden');
            } else {
                pasteBtn.classList.remove('hidden');
                clearBtn.classList.add('hidden');
            }
        });

        function pasteLink() {
            navigator.clipboard.readText().then(text => { 
                input.value = text;
                // পেস্ট করার পর বাটন আপডেট করতে ট্রিগার
                input.dispatchEvent(new Event('input'));
            });
        }

        function clearInput() { 
            input.value = ''; 
            // ক্লিয়ার করার পর বাটন আপডেট করতে ট্রিগার
            input.dispatchEvent(new Event('input'));
        }

        async function downloadVideo() {
            const url = input.value.trim();
            const result = document.getElementById('result');
            const btn = document.getElementById('downloadBtn');
            
            if(!url) { alert("Please paste a link first!"); return; }
            
            btn.disabled = true; btn.innerText = "Processing...";
            try {
                const response = await fetch('/download', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ url: url }) });
                const data = await response.json();
                if (data.success) {
                    result.innerHTML = `<a href="${data.url}" target="_blank" class="block w-full bg-green-600 p-4 rounded-lg font-bold">Download Video Now</a>`;
                } else {
                    result.innerText = "Error: Video not found.";
                }
            } catch (err) { result.innerText = "Server error!"; } finally { btn.disabled = false; btn.innerText = "Download"; }
        }
    </script>
</body>
</html>
