<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tik2BD - TikTok Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hero-gradient { background: linear-gradient(135deg, #4f46e5 0%, #d946ef 100%); }
    </style>
</head>
<body class="bg-[#0f172a] text-white font-sans">

    <section class="hero-gradient min-h-[400px] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4">Tik2BD Downloader</h1>
        <p class="mb-8 opacity-90">Download TikTok videos without watermark in HD.</p>

        <div id="input-section" class="max-w-xl w-full bg-white p-2 rounded-2xl shadow-2xl flex items-center">
            <input type="text" id="urlInput" placeholder="Paste link here..." 
                   class="w-full p-4 text-slate-900 outline-none rounded-l-xl">
            <button onclick="pasteLink()" class="px-3 text-slate-500 hover:text-blue-600 font-bold">Paste</button>
            <button onclick="clearInput()" class="px-3 text-slate-500 hover:text-red-600 font-bold">Clear</button>
            <button onclick="downloadVideo()" id="downloadBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl transition">
                Download
            </button>
        </div>

        <div id="result-section" class="hidden max-w-sm w-full bg-slate-900 mt-6 p-6 rounded-2xl border border-slate-700">
            <img id="avatar" src="" class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-blue-500">
            <h2 id="nickname" class="text-lg font-bold mb-4"></h2>
            <div class="space-y-3">
                <a id="hd_btn" href="#" target="_blank" class="block bg-blue-600 py-3 rounded-lg font-bold">Without Watermark (HD)</a>
                <a id="sd_btn" href="#" target="_blank" class="block bg-slate-700 py-3 rounded-lg font-bold">Without Watermark</a>
                <a id="mp3_btn" href="#" target="_blank" class="block bg-purple-600 py-3 rounded-lg font-bold">Download MP3</a>
            </div>
            <button onclick="location.reload()" class="mt-4 text-slate-400 text-sm underline">Search another video</button>
        </div>
    </section>

    <script>
        const input = document.getElementById('urlInput');

        function pasteLink() {
            navigator.clipboard.readText().then(text => { input.value = text; });
        }

        function clearInput() { input.value = ''; }

        async function downloadVideo() {
            const url = input.value;
            const btn = document.getElementById('downloadBtn');
            if(!url) { alert("Please enter a link!"); return; }
            
            btn.innerText = "Processing...";
            const response = await fetch('/download', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ url: url }) });
            const data = await response.json();

            if (data.success) {
                document.getElementById('input-section').classList.add('hidden');
                document.getElementById('result-section').classList.remove('hidden');
                
                document.getElementById('avatar').src = data.avatar;
                document.getElementById('nickname').innerText = data.nickname;
                document.getElementById('hd_btn').href = data.hd_url;
                document.getElementById('sd_btn').href = data.sd_url;
                document.getElementById('mp3_btn').href = data.mp3_url;
            } else {
                alert("Error: " + data.error);
                btn.innerText = "Download";
            }
        }
    </script>
</body>
</html>
