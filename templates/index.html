<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tik2BD - Professional TikTok Video Downloader No Watermark</title>
    <meta name="description" content="Download TikTok videos without watermark in HD quality. Fast, free, and secure TikTok downloader. Powered by SkyNet Digital AI.">
    <link rel="canonical" href="https://yourdomain.com/">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); border-left: 4px solid #06b6d4; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <main class="max-w-4xl mx-auto px-5 py-12">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Tik2BD</h1>
            <p class="text-slate-400 mt-3 text-lg">HD Quality • Fast Download • 100% Free</p>
        </header>

        <div class="glass rounded-3xl p-6 shadow-2xl">
            <div class="relative flex items-center bg-slate-900 rounded-2xl p-2 border border-slate-700 focus-within:border-cyan-500 transition">
                <input id="urlInput" class="flex-1 bg-transparent p-3 outline-none text-white placeholder:text-slate-600" placeholder="Paste your TikTok link...">
                <button onclick="pasteLink()" class="px-4 text-slate-400 hover:text-cyan-400">Paste</button>
                <button id="clearBtn" onclick="clearInput()" class="hidden px-4 text-red-400">Clear</button>
            </div>
            <button id="downloadBtn" onclick="processDownload()" class="w-full mt-4 bg-gradient-to-r from-cyan-600 to-blue-600 py-4 rounded-2xl font-bold hover:scale-[1.01] transition shadow-lg">Download Video</button>
        </div>

        <div id="resultArea" class="mt-8"></div>
    </main>

    <script>
        const i = document.getElementById('urlInput');
        const c = document.getElementById('clearBtn');
        
        i.addEventListener('input', () => c.classList.toggle('hidden', !i.value));
        
        async function pasteLink() {
            i.value = await navigator.clipboard.readText();
            c.classList.remove('hidden');
        }
        function clearInput() { i.value = ''; c.classList.add('hidden'); }

        async function processDownload() {
            const btn = document.getElementById('downloadBtn');
            const res = document.getElementById('resultArea');
            btn.disabled = true;
            res.innerHTML = '<div class="flex justify-center p-10"><div class="spinner w-10 h-10 rounded-full"></div></div>';
            
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url: i.value})
                });
                const d = await response.json();
                
                if(d.success) {
                    res.innerHTML = `
                        <div class="glass p-6 rounded-3xl animate-in slide-in-from-bottom duration-500">
                            <div class="flex gap-4">
                                <img src="${d.thumbnail}" class="w-32 h-32 rounded-xl object-cover">
                                <div>
                                    <h3 class="font-bold text-lg">${d.title || 'TikTok Video'}</h3>
                                    <p class="text-slate-400">Author: ${d.author}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mt-6">
                                <a href="${d.hd_url}" class="bg-cyan-600 py-3 rounded-xl text-center font-bold">HD Download</a>
                                <a href="${d.sd_url}" class="bg-slate-700 py-3 rounded-xl text-center font-bold">SD Download</a>
                            </div>
                        </div>
                    `;
                } else {
                    res.innerHTML = `<div class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl text-center text-red-400">${d.error}</div>`;
                }
            } catch(e) { res.innerHTML = 'Error occurred.'; }
            btn.disabled = false;
        }

        // Auto Paste on Load
        window.onload = async () => {
            const text = await navigator.clipboard.readText();
            if(text.includes('tiktok')) { i.value = text; c.classList.remove('hidden'); }
        }
    </script>
</body>
</html>
