<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SkyNet Digital AI Downloader</title>
</head>
<body>
    <h2>SkyNet Digital AI Downloader</h2>
    <input type="text" id="urlInput" placeholder="TikTok URL এখানে দিন">
    <button onclick="downloadVideo()">ডাউনলোড লিঙ্ক খুঁজুন</button>
    <p id="result"></p>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('urlInput').value;
            const result = document.getElementById('result');
            
            result.innerText = "ডাউনলোড লিঙ্ক তৈরি হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...";

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (data.success && data.url) {
                    result.innerHTML = `<a href="${data.url}" target="_blank">ভিডিও ডাউনলোড করতে এখানে ক্লিক করুন</a>`;
                } else {
                    result.innerText = "এরর: ভিডিও লিঙ্ক খুঁজে পাওয়া যায়নি।";
                }
            } catch (err) {
                result.innerText = "এরর: সার্ভারে সমস্যা হয়েছে।";
            }
        }
    </script>
</body>
</html>
