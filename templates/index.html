<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tik2BD - Professional TikTok Downloader No Watermark</title>
    <meta name="description" content="Download TikTok videos without watermark in HD quality. Fast, free, and mobile-friendly TikTok downloader.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="text-white min-h-screen">

    <div class="max-w-4xl mx-auto px-5 py-20 text-center">
        <h1 class="text-5xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Tik2BD Downloader</h1>
        <p class="text-slate-400 mt-4 text-lg">HD Quality • Fast Download • 100% Free</p>

        <div class="glass rounded-3xl p-4 mt-10 shadow-2xl">
            <div class="flex flex-col sm:flex-row gap-2">
                <input id="urlInput" oninput="validateUrl()" placeholder="Paste TikTok link here..." class="flex-1 bg-transparent p-4 outline-none border-b-2 border-slate-700 focus:border-cyan-500 transition">
                <button id="downloadBtn" onclick="processDownload()" disabled class="bg-blue-600 px-8 py-4 rounded-2xl font-bold disabled:opacity-50 hover:scale-105 transition">Download</button>
            </div>
        </div>

        <div id="resultArea" class="mt-8"></div>
    </div>

    <section class="max-w-3xl mx-auto px-5 py-10">
        <h2 class="text-3xl font-bold mb-6">Frequently Asked Questions</h2>
        <div class="space-y-4">
            <div class="glass p-4 rounded-xl">Is it free? Yes, 100% free.</div>
            <div class="glass p-4 rounded-xl">Watermark? No, we remove it.</div>
            </div>
    </section>

    <script>
        function validateUrl() {
            const input = document.getElementById('urlInput');
            const btn = document.getElementById('downloadBtn');
            const regex = /^(https?:\/\/)?(www\.)?(tiktok\.com|vm\.tiktok\.com|vt\.tiktok\.com)/;
            if(regex.test(input.value)) {
                input.classList.replace('border-slate-700', 'border-green-500');
                btn.disabled = false;
            } else {
                input.classList.replace('border-green-500', 'border-slate-700');
                btn.disabled = true;
            }
        }

        async function processDownload() {
            const url = document.getElementById('urlInput').value;
            const resArea = document.getElementById('resultArea');
            
            resArea.innerHTML = '<div class="text-cyan-400 animate-pulse">Processing video...</div>';
            
            const response = await fetch('/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            const d = await response.json();
            
            if(d.success) {
                resArea.innerHTML = `
                    <div class="glass p-6 rounded-3xl text-left">
                        <img src="${d.thumbnail}" class="w-full h-64 object-cover rounded-xl mb-4">
                        <h3 class="font-bold text-xl">${d.title}</h3>
                        <p class="text-slate-400">Author: ${d.author}</p>
                        <div class="flex gap-4 mt-6">
                            <a href="${d.hd_url}" download class="flex-1 bg-cyan-600 p-4 rounded-xl text-center font-bold">Download HD</a>
                            <a href="${d.sd_url}" download class="flex-1 bg-slate-700 p-4 rounded-xl text-center font-bold">Download SD</a>
                        </div>
                    </div>
                `;
            } else {
                resArea.innerHTML = `<div class="bg-red-900/50 p-4 rounded-xl border border-red-500">${d.error}</div>`;
            }
        }

        // Auto paste on load
        window.onload = async () => {
            try {
                const text = await navigator.clipboard.readText();
                if(text.includes('tiktok.com')) {
                    document.getElementById('urlInput').value = text;
                    validateUrl();
                }
            } catch(e) {}
        }
    </script>
</body>
</html>
