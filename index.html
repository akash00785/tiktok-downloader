<!DOCTYPE html>
<html>
<head>
    <title>SkyNet Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-4xl font-bold mb-6">SkyNet Digital AI Downloader</h1>
    <input id="url" type="text" placeholder="TikTok ভিডিও লিংক দিন" class="p-3 w-80 rounded text-black mb-4">
    <button onclick="getLink()" class="bg-blue-600 px-6 py-2 rounded">ডাউনলোড লিংক খুঁজুন</button>
    <p id="result" class="mt-4"></p>

    <script>
        async function getLink() {
            const url = document.getElementById('url').value;
            const res = await fetch('/download', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url: url})
            });
            const data = await res.json();
            if(data.success) {
                document.getElementById('result').innerHTML = `<a href="${data.url}" target="_blank" class="text-green-400 font-bold">ভিডিওটি এখানে ক্লিক করে ডাউনলোড করুন</a>`;
            } else {
                alert("এরর: লিংকটি কাজ করছে না!");
            }
        }
    </script>
</body>
</html>
